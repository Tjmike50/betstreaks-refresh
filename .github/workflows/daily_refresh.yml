name: Daily Refresh

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Refresh Players
        run: python refresh_players.py
      - name: Refresh Teams
        run: python refresh_teams.py
